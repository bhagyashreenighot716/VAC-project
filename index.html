<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Care Hospital</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#eef7fb}
.hero{position:relative;height:100vh;overflow:hidden}
.slide{position:absolute;inset:0;opacity:0;animation:fade 16s infinite;background-size:cover;background-position:center}
.slide:nth-child(1){animation-delay:0s;background-image:url('https://picsum.photos/seed/hospital1/1600/900')}
.slide:nth-child(2){animation-delay:4s;background-image:url('https://picsum.photos/seed/hospital2/1600/900')}
.slide:nth-child(3){animation-delay:8s;background-image:url('https://picsum.photos/seed/hospital3/1600/900')}
.slide:nth-child(4){animation-delay:12s;background-image:url('https://picsum.photos/seed/hospital4/1600/900')}
@keyframes fade{0%,20%{opacity:1}25%,100%{opacity:0}}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.45);display:flex;justify-content:center;align-items:center;text-align:center;color:#fff;padding:20px}
h1{font-size:52px} p{margin:15px 0 25px}
button{padding:12px 24px;border:none;border-radius:8px;background:#0a9c6b;color:#fff;font-size:18px;cursor:pointer}
.formwrap{display:none;max-width:700px;margin:25px auto;background:#fff;padding:20px;border-radius:10px;box-shadow:0 0 10px #aaa}
input,select,textarea{width:100%;padding:10px;margin:8px 0}
.success{display:none;color:green;font-weight:bold;text-align:center;margin-top:15px}
@media(max-width:700px){h1{font-size:34px}}
</style>
</head>
<body>
<section class="hero">
<div class="slide"></div><div class="slide"></div><div class="slide"></div><div class="slide"></div>
<div class="overlay">
<div>
<h1>🏥 City Care Hospital</h1>
<p>Your Health, Our Priority</p>
<button onclick="showForm()">Book Appointment</button>
</div>
</div>
</section>

<div class="formwrap" id="form">
<h2>Hospital Appointment Form</h2>
<form onsubmit="book(event)">
<input type="text" placeholder="Patient Name" required>
<input type="number" placeholder="Age" required>
<select required><option value="">Gender</option><option>Male</option><option>Female</option><option>Other</option></select>
<input type="tel" placeholder="Mobile Number" required>
<input type="email" placeholder="Email Address" required>
<select required><option value="">Department</option><option>Cardiology</option><option>ENT</option><option>Orthopedics</option><option>Pediatrics</option></select>
<input type="date" required>
<input type="time" required>
<textarea placeholder="Describe your problem"></textarea>
<input type="file">
<label><input type="checkbox" required> I agree to the terms.</label><br><br>
<button type="submit">Submit Appointment</button>
</form>
<div class="success" id="success">✅ Appointment Booked Successfully!</div>
</div>

<script>
function showForm(){
 document.getElementById('form').style.display='block';
 document.getElementById('form').scrollIntoView({behavior:'smooth'});
}
function book(e){
 e.preventDefault();
 document.getElementById('success').style.display='block';
 e.target.reset();
}
</script>
</body>
</html>
